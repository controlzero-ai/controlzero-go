  min_length: 52
  label_required:
  - dev.azure.com
  - visualstudio.com
  - AZDO_TOKEN
  - AZURE_DEVOPS_PAT
  - System.AccessToken
  label_byte_window: 96
  severity: P0
  default_rotation_hours: 1
  description: Azure DevOps personal access token. 52-char base32; label-gated on Azure DevOps hosts and the canonical env var names (gemini P2 review, 2026-05-20).
  rotation_url: https://dev.azure.com/_usersSettings/tokens
  references:
  - https://learn.microsoft.com/en-us/azure/devops/organizations/accounts/use-personal-access-tokens-to-authenticate
  sample_anonymized: REDACTED_IN_PUBLIC_MIRROR
- id: ADOBE_CLIENT_SECRET
  category: cloud
  provider: adobe
  token_type: io_client_secret
  strategy: regex
  regex: (?:[^A-Za-z0-9_-]|^)(p8e-[a-z0-9_-]{32})(?:[^A-Za-z0-9_-]|$)
  severity: P1
  default_rotation_hours: 4
  description: Adobe IO client secret (p8e- prefix).
  rotation_url: https://developer.adobe.com/console
  references:
  - https://github.com/gitleaks/gitleaks/blob/master/config/gitleaks.toml
  sample_anonymized: REDACTED_IN_PUBLIC_MIRROR
- id: OKTA_ACCESS_TOKEN
  category: cloud
  provider: okta
  token_type: api_token
  strategy: regex_with_entropy
  regex: (?:[^A-Za-z0-9=_-]|^)(00[A-Za-z0-9=_-]{40})(?:[^A-Za-z0-9=_-]|$)
  entropy_min: 4.0
  min_length: 42
  label_required:
  - okta
  - OKTA_TOKEN
  - SSWS
  label_byte_window: 64
  severity: P0
  default_rotation_hours: 1
  description: Okta API token. Label-gated to suppress arbitrary 42-char tokens.
  rotation_url: https://developer.okta.com/docs/guides/create-an-api-token/main/
  references:
  - https://developer.okta.com/docs/guides/create-an-api-token/main/
  sample_anonymized: REDACTED_IN_PUBLIC_MIRROR
- id: POSTGRES_CONN_STRING_PW
  category: db
  provider: postgres
  token_type: connection_string_password
  strategy: regex
  regex: (postgres(?:ql)?://[^:@\s/]+:)([^@\s/]{4,})(@[^\s]+)
  severity: P0
  default_rotation_hours: 1
  description: Postgres connection string with embedded password. Captures the user:password@host segment. Production credential.
  rotation_url: https://www.postgresql.org/docs/current/auth-password.html
  references:
  - https://www.postgresql.org/docs/current/libpq-connect.html
  sample_anonymized: REDACTED_IN_PUBLIC_MIRROR
- id: MYSQL_CONN_STRING_PW
  category: db
