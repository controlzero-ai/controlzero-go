  token_type: publishable_anon_key
  strategy: regex
  regex: (?:[^A-Za-z0-9_-]|^)(sb_publishable_[A-Za-z0-9_-]{32,128})(?:[^A-Za-z0-9_-]|$)
  severity: P2
  default_rotation_hours: 24
  description: Supabase publishable anon key (current format). Public-by-design but advisory rotation if exposed pre-launch.
  rotation_url: https://supabase.com/docs/guides/api/api-keys
  references:
  - https://supabase.com/docs/guides/api/api-keys
  sample_anonymized: REDACTED_IN_PUBLIC_MIRROR
- id: SNOWFLAKE_PASSWORD_LABEL
