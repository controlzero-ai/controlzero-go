  token_type: connection_string_password
  strategy: regex
  regex: (clickhouse(?:s)?://[^:@\s/]+:)([^@\s/]{4,})(@[^\s]+)
  severity: P0
  default_rotation_hours: 1
  description: ClickHouse connection string with embedded password.
  rotation_url: https://clickhouse.com/docs/en/operations/access-rights
  references:
  - https://clickhouse.com/docs/en/operations/access-rights
  sample_anonymized: REDACTED_IN_PUBLIC_MIRROR
- id: CLICKHOUSE_CLOUD_API_SECRET
