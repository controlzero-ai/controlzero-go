  strategy: regex
  regex: (redis(?:s)?://[^:@\s/]*:)([^@\s/]{4,})(@[^\s]+)
  severity: P0
  default_rotation_hours: 1
  description: Redis connection string with embedded password. Covers redis:// and rediss:// (TLS).
  rotation_url: https://redis.io/docs/management/security/acl/
  references:
  - https://redis.io/docs/connect/
  sample_anonymized: REDACTED_IN_PUBLIC_MIRROR
- id: CLICKHOUSE_CONN_STRING_PW
  category: db
