  rotation_url: https://devcenter.heroku.com/articles/account-api-tokens
  references:
  - https://devcenter.heroku.com/articles/account-api-tokens
  sample_anonymized: REDACTED_IN_PUBLIC_MIRROR
- id: ALIBABA_ACCESS_KEY_ID
  category: cloud
  provider: alibaba
  token_type: access_key_id
  strategy: regex
  regex: (?:[^A-Za-z0-9]|^)(LTAI[A-Za-z0-9]{16,22})(?:[^A-Za-z0-9]|$)
