  description: DigitalOcean OAuth access token.
  rotation_url: https://docs.digitalocean.com/reference/api/oauth-api/
  references:
  - https://github.com/gitleaks/gitleaks/blob/master/config/gitleaks.toml
  sample_anonymized: REDACTED_IN_PUBLIC_MIRROR
- id: HEROKU_API_KEY_V2
  category: cloud
  provider: heroku
  token_type: api_key_v2
  strategy: regex
  regex: (?:[^A-Za-z0-9_-]|^)(HRKU-AA[A-Za-z0-9_-]{58})(?:[^A-Za-z0-9_-]|$)
