version: 1
tombstones: []
patterns:
- id: AWS_ACCESS_KEY_ID
  category: cloud
  provider: aws
  token_type: access_key_id
  strategy: regex
  regex: (?:[^A-Z0-9]|^)(AKIA|ASIA|ABIA|ACCA|A3T[A-Z0-9])[A-Z0-9]{16}(?:[^A-Z0-9]|$)
  severity: P0
  default_rotation_hours: 1
  description: AWS IAM access key id. Long-lived production credential when prefixed AKIA; short-lived STS session key when prefixed ASIA. Rotate immediately on detection.
  rotation_url: https://docs.aws.amazon.com/IAM/latest/UserGuide/id_credentials_access-keys.html
  references:
  - https://docs.aws.amazon.com/IAM/latest/UserGuide/reference_identifiers.html
  - https://github.com/gitleaks/gitleaks/blob/master/config/gitleaks.toml
  sample_anonymized: REDACTED_IN_PUBLIC_MIRROR
- id: AWS_SECRET_ACCESS_KEY
  category: cloud
  provider: aws
  token_type: secret_access_key
  strategy: regex_with_paired_token
  regex: (?:[^A-Za-z0-9/+]|^)([A-Za-z0-9/+=]{40})(?:[^A-Za-z0-9/+=]|$)
  entropy_min: 4.5
  min_length: 40
  paired_with: AWS_ACCESS_KEY_ID
  paired_max_byte_distance: 256
  label_required:
  - aws_secret_access_key
  - SecretAccessKey
  - AWS_SECRET_ACCESS_KEY
  label_byte_window: 64
  severity: P0
  default_rotation_hours: 1
  description: AWS secret access key. 40-char base64-shaped value. Only fires when paired with an access key id within 256 bytes OR when an explicit AWS_SECRET_ACCESS_KEY label sits within 64 bytes. Entropy gate filters arbitrary 40-char base64.
  rotation_url: https://docs.aws.amazon.com/IAM/latest/UserGuide/id_credentials_access-keys.html
  references:
  - https://docs.aws.amazon.com/IAM/latest/UserGuide/best-practices.html
  sample_anonymized: REDACTED_IN_PUBLIC_MIRROR
- id: AWS_SESSION_TOKEN
  category: cloud
  provider: aws
  token_type: session_token
  strategy: regex_with_entropy
  regex: (?:[^A-Za-z0-9/+]|^)(FwoG[A-Za-z0-9/+=]{50,})(?:[^A-Za-z0-9/+=]|$)
  entropy_min: 4.5
  min_length: 200
  severity: P0
  default_rotation_hours: 1
  description: AWS STS session token. Short-lived but production-grade. Starts with FwoG and is base64-shaped over several hundred bytes.
  rotation_url: https://docs.aws.amazon.com/STS/latest/APIReference/welcome.html
  references:
  - https://docs.aws.amazon.com/STS/latest/APIReference/API_AssumeRole.html
  sample_anonymized: REDACTED_IN_PUBLIC_MIRROR
- id: AWS_BEDROCK_API_KEY
  category: cloud
  provider: aws
  token_type: bedrock_api_key_long_lived
  strategy: regex
  regex: (?:[^A-Za-z0-9+/]|^)(ABSK[A-Za-z0-9+/]{109,269})(?:[^A-Za-z0-9+/]|$)
  severity: P0
  default_rotation_hours: 1
  description: AWS Bedrock service API key. Provides direct invoke access to foundation models; treat as production cloud credential.
  rotation_url: https://docs.aws.amazon.com/bedrock/latest/userguide/api-keys.html
  references:
  - https://github.com/gitleaks/gitleaks/blob/master/config/gitleaks.toml
  sample_anonymized: REDACTED_IN_PUBLIC_MIRROR
- id: GCP_API_KEY
  category: cloud
  provider: gcp
  token_type: api_key
  strategy: regex
  regex: (?:[^A-Za-z0-9_-]|^)(AIza[A-Za-z0-9_-]{35})(?:[^A-Za-z0-9_-]|$)
  severity: P1
  default_rotation_hours: 4
  description: Google Cloud Platform API key. Used for Maps, YouTube, Generative AI, Firebase config, and most consumer GCP services. Scope depends on key restrictions; treat as high until proven otherwise.
  rotation_url: https://cloud.google.com/docs/authentication/api-keys
  references:
  - https://cloud.google.com/docs/authentication/api-keys#api_key_format
  - https://github.com/gitleaks/gitleaks/blob/master/config/gitleaks.toml
  sample_anonymized: REDACTED_IN_PUBLIC_MIRROR
- id: GCP_SERVICE_ACCOUNT_JSON
  category: cloud
  provider: gcp
  token_type: service_account_json
  strategy: marker_block
  begin_marker: '"type": "service_account"'
  end_marker: '"client_x509_cert_url"'
  max_block_bytes: 8192
  severity: P0
  default_rotation_hours: 1
  description: GCP service account JSON key file. Contains a long-lived private key with broad project access. Any detection requires immediate rotation.
  rotation_url: https://cloud.google.com/iam/docs/keys-create-delete
  references:
  - https://cloud.google.com/iam/docs/service-accounts
  sample_anonymized: REDACTED_IN_PUBLIC_MIRROR
- id: AZURE_AD_CLIENT_SECRET
  category: cloud
  provider: azure
  token_type: ad_app_client_secret
  strategy: regex_with_entropy
  regex: (?:[^A-Za-z0-9_~.]|^)([a-zA-Z0-9_~.]{3}[0-9]Q~[A-Za-z0-9_~.-]{31,34})(?:[^A-Za-z0-9_~.-]|$)
  entropy_min: 3.0
  min_length: 34
  severity: P0
  default_rotation_hours: 1
  description: Azure AD application client secret. Format includes the Q~ infix that Microsoft introduced for scanner identification.
  rotation_url: https://learn.microsoft.com/en-us/entra/identity-platform/howto-create-service-principal-portal
  references:
  - https://learn.microsoft.com/en-us/entra/identity-platform/howto-create-service-principal-portal
  - https://github.com/gitleaks/gitleaks/blob/master/config/gitleaks.toml
  sample_anonymized: REDACTED_IN_PUBLIC_MIRROR
- id: AZURE_STORAGE_ACCOUNT_KEY
  category: cloud
  provider: azure
  token_type: storage_account_key
  strategy: regex_with_entropy
  regex: (?:[^A-Za-z0-9+/=]|^)([A-Za-z0-9+/]{86}==)(?:[^A-Za-z0-9+/=]|$)
  entropy_min: 5.0
  min_length: 88
  label_required:
  - AccountKey
  - storageAccountKey
  - DefaultEndpointsProtocol
  label_byte_window: 128
  severity: P0
  default_rotation_hours: 1
  description: Azure storage account primary or secondary key. 88-char base64 ending in '=='. Label-gated to suppress arbitrary base64.
  rotation_url: https://learn.microsoft.com/en-us/azure/storage/common/storage-account-keys-manage
  references:
  - https://learn.microsoft.com/en-us/azure/storage/common/storage-account-keys-manage
  sample_anonymized: REDACTED_IN_PUBLIC_MIRROR
- id: AZURE_SAS_TOKEN
  category: cloud
  provider: azure
  token_type: shared_access_signature
  strategy: regex
  regex: (?:[?&])sig=([A-Za-z0-9%]{43,128})(?:&|$)
  label_required:
  - blob.core.windows.net
  - queue.core.windows.net
  - table.core.windows.net
  - file.core.windows.net
  - dfs.core.windows.net
  - servicebus.windows.net
  - SharedAccessSignature
  label_byte_window: 256
  severity: P1
  default_rotation_hours: 4
  description: Azure Shared Access Signature query parameter. Time-limited but scoped at storage container level. Label-gated on Azure resource hosts so non-Azure signed URLs do not trigger (codex P2 review, 2026-05-20).
  rotation_url: https://learn.microsoft.com/en-us/azure/storage/common/storage-sas-overview
  references:
  - https://learn.microsoft.com/en-us/azure/storage/common/storage-sas-overview
  sample_anonymized: REDACTED_IN_PUBLIC_MIRROR
- id: CLOUDFLARE_API_TOKEN
  category: cloud
  provider: cloudflare
  token_type: api_token
  strategy: regex_with_entropy
  regex: (?:[^A-Za-z0-9_-]|^)([A-Za-z0-9_-]{40})(?:[^A-Za-z0-9_-]|$)
  entropy_min: 4.0
  min_length: 40
  label_required:
  - cloudflare
  - CF_API_TOKEN
  - CLOUDFLARE_API_TOKEN
  label_byte_window: 64
  severity: P1
  default_rotation_hours: 4
  description: Cloudflare API token. 40 chars of base64url. Label-gated.
  rotation_url: https://developers.cloudflare.com/fundamentals/api/get-started/create-token/
  references:
  - https://developers.cloudflare.com/fundamentals/api/get-started/token-formats/
  sample_anonymized: REDACTED_IN_PUBLIC_MIRROR
- id: CLOUDFLARE_GLOBAL_API_KEY
  category: cloud
  provider: cloudflare
  token_type: global_api_key
  strategy: regex
  regex: (?:[^a-f0-9]|^)([a-f0-9]{37})(?:[^a-f0-9]|$)
  label_required:
  - cloudflare
  - CF_API_KEY
  - X-Auth-Key
  label_byte_window: 64
  severity: P0
  default_rotation_hours: 1
  description: Cloudflare global API key. Legacy auth, broad account scope. Label-gated to suppress arbitrary 37-char hex.
  rotation_url: https://developers.cloudflare.com/fundamentals/api/get-started/create-token/
  references:
  - https://github.com/gitleaks/gitleaks/blob/master/config/gitleaks.toml
  sample_anonymized: REDACTED_IN_PUBLIC_MIRROR
- id: DIGITALOCEAN_PAT
  category: cloud
  provider: digitalocean
