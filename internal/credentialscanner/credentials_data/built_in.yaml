  token_type: connection_string_password
  strategy: regex
  regex: (mysql://[^:@\s/]+:)([^@\s/]{4,})(@[^\s]+)
  severity: P0
  default_rotation_hours: 1
  description: MySQL connection string with embedded password.
  rotation_url: https://dev.mysql.com/doc/refman/8.0/en/account-management-statements.html
  references:
  - https://dev.mysql.com/doc/connector-net/en/connector-net-connection-options.html
  sample_anonymized: REDACTED_IN_PUBLIC_MIRROR
- id: MONGODB_CONN_STRING_PW
  category: db
  provider: mongodb
  token_type: connection_string_password
  strategy: regex
  regex: (mongodb(?:\+srv)?://[^:@\s/]+:)([^@\s/]{4,})(@[^\s]+)
  severity: P0
  default_rotation_hours: 1
  description: MongoDB connection string with embedded password. Covers Atlas mongodb+srv:// and self-hosted mongodb:// shapes.
  rotation_url: https://www.mongodb.com/docs/atlas/security-add-mongodb-users/
  references:
  - https://www.mongodb.com/docs/manual/reference/connection-string/
  sample_anonymized: REDACTED_IN_PUBLIC_MIRROR
- id: REDIS_CONN_STRING_PW
