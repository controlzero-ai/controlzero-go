  references:
  - https://github.com/gitleaks/gitleaks/blob/master/config/gitleaks.toml
  sample_anonymized: REDACTED_IN_PUBLIC_MIRROR
- id: SUPABASE_SERVICE_ROLE_KEY
  category: db
  provider: supabase
  token_type: service_role_jwt
  strategy: regex
  regex: (?:[^A-Za-z0-9_-]|^)(sb_secret_[A-Za-z0-9_-]{32,128})(?:[^A-Za-z0-9_-]|$)
  severity: P0
  default_rotation_hours: 1
  description: Supabase service role key (current format). Bypasses Row Level Security entirely; production credential.
  rotation_url: https://supabase.com/docs/guides/api/api-keys
  references:
  - https://supabase.com/docs/guides/api/api-keys
  sample_anonymized: REDACTED_IN_PUBLIC_MIRROR
- id: SUPABASE_PUBLISHABLE_KEY
  category: db
